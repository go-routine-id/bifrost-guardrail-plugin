name: build-and-deploy

# Build a custom Bifrost image (upstream + guardrail) and optionally deploy it to Nomad.
#
# Triggers:
#   - workflow_dispatch: pick the upstream tag and whether to deploy (manual, safe default).
#   - push of a tag matching v*: builds and deploys (an intentional release action).
#
# Required repository secrets for the deploy job:
#   NOMAD_ADDR   e.g. https://nomad.example.com
#   NOMAD_TOKEN  a Nomad ACL token allowed to submit the "bifrost" job (scope it down)
#
# The pushed image must be pullable by the Nomad node. Easiest: set the GHCR package
# visibility to public (the image contains no secrets — config lives on the host volume).

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: Upstream Bifrost tag to build from
        default: transports/v1.6.0
      deploy:
        description: Deploy to Nomad after building
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag || 'transports/v1.6.0' }}
  IMAGE: ghcr.io/${{ github.repository_owner }}/bifrost

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.ver.outputs.image_ref }}
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Derive image version
        id: ver
        run: |
          base="${UPSTREAM_TAG#transports/v}"
          version="${base}-guardrail"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE}:${version}" >> "$GITHUB_OUTPUT"

      - name: Clone upstream at tag
        run: git clone --depth 1 --branch "$UPSTREAM_TAG" https://github.com/maximhq/bifrost.git upstream

      - name: Apply guardrail (source + wiring)
        run: |
          mkdir -p upstream/transports/bifrost-http/guardrail
          cp guardrail.go upstream/transports/bifrost-http/guardrail/guardrail.go
          cd upstream
          git apply --3way ../wiring.patch || git apply ../wiring.patch

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: upstream
          file: upstream/transports/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ver.outputs.image_ref }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}

  deploy:
    needs: build
    if: ${{ github.event_name == 'push' || github.event.inputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Install Nomad CLI
        run: |
          ver=1.11.0
          curl -fsSL -o nomad.zip "https://releases.hashicorp.com/nomad/${ver}/nomad_${ver}_linux_amd64.zip"
          unzip -o nomad.zip
          sudo install nomad /usr/local/bin/nomad
          nomad version

      - name: Deploy to Nomad
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
        run: |
          nomad job run -var "image=${{ needs.build.outputs.image_ref }}" deploy/bifrost.nomad.hcl
